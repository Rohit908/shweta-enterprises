<header class="navbar" [class.scrolled]="scrolled">
  <div class="container">
    <a routerLink="/" class="logo" (click)="closeMenu()">
      <span class="logo-icon">SE</span>
      <div class="logo-text">
        <span class="logo-name">Shweta Enterprises</span>
        <span class="logo-tagline">Where Every Fiber Tells a Story</span>
      </div>
    </a>

    <nav class="nav-links" [class.open]="menuOpen">
      <a *ngFor="let link of navLinks"
         [routerLink]="link.path"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{exact: link.path === '/'}"
         (click)="closeMenu()">
        {{ link.label }}
      </a>
      <a href="tel:9967813132" class="nav-cta" (click)="closeMenu()">
        <i class="fa-solid fa-phone"></i> Call Us
      </a>
    </nav>

    <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
