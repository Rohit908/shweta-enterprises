<section class="stats-section">
  <div class="container">
    <div class="stats-grid">
      <div class="stat-card" *ngFor="let stat of stats">
        <div class="stat-icon"><i class="fa-solid {{ stat.icon }} fa-2xl" style="color: rgb(201,168,76)"></i></div>
        <div class="stat-value">{{ stat.current }}{{ stat.suffix }}</div>
        <div class="stat-label">{{ stat.label }}</div>
      </div>
    </div>
  </div>
</section>
